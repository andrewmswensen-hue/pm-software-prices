name: Weekly Pricing Update

on:
  schedule:
    # Mondays at 14:00 UTC == 9:00 AM ET (10:00 AM ET during DST)
    - cron: '0 14 * * 1'
  workflow_dispatch:  # Manual trigger from the Actions tab

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run pricing scraper
        run: python scripts/weekly_update.py | tee /tmp/scrape_output.txt
        continue-on-error: true

      - name: Run Reddit chatter search
        run: python scripts/chatter.py | tee /tmp/chatter_output.txt
        continue-on-error: true

      - name: Record price history if tiers changed
        run: python scripts/record_price_history.py

      - name: Regenerate README
        run: python scripts/render_readme.py

      - name: Regenerate live dashboard
        run: python scripts/render_dashboard.py

      - name: Detect changes (log only)
        id: detect
        run: |
          COUNT=$(python scripts/detect_changes.py)
          echo "count=$COUNT" >> $GITHUB_OUTPUT
          echo "Detected $COUNT change(s) this week"

      # Email + Claude snippet steps are intentionally disabled.
      # Scripts (detect_changes.py, generate_snippets.py, build_email.py)
      # remain in the repo and can be re-enabled by uncommenting the steps
      # below and adding the ANTHROPIC_API_KEY secret.
      #
      # - name: Generate newsletter snippets (Claude)
      #   if: steps.detect.outputs.count != '0'
      #   run: python scripts/generate_snippets.py
      #   env:
      #     ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      #
      # - name: Build email body
      #   if: steps.detect.outputs.count != '0'
      #   id: build_email
      #   run: |
      #     python scripts/build_email.py
      #     SUBJECT=$(cat /tmp/email_subject.txt)
      #     echo "subject=$SUBJECT" >> $GITHUB_OUTPUT
      #
      # - name: Send notification email
      #   if: steps.detect.outputs.count != '0'
      #   uses: dawidd6/action-send-mail@v3
      #   with:
      #     server_address: smtp.gmail.com
      #     server_port: 587
      #     secure: false
      #     username: ${{ secrets.SMTP_USERNAME }}
      #     password: ${{ secrets.SMTP_PASSWORD }}
      #     subject: ${{ steps.build_email.outputs.subject }}
      #     to: aswensen@rlpmg.com, peter@rlpmg.com
      #     from: PM Pricing Tracker <${{ secrets.SMTP_USERNAME }}>
      #     html_body: file:///tmp/email_body.html

      - name: Commit and push if changed
        run: |
          git config user.name "Pricing Tracker Bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          DATE=$(date +%Y-%m-%d)
          SCRAPE_SUMMARY=$(tail -25 /tmp/scrape_output.txt || echo "(no scrape output)")
          CHATTER_SUMMARY=$(tail -5 /tmp/chatter_output.txt || echo "(no chatter output)")
          CHANGES_COUNT="${{ steps.detect.outputs.count }}"
          if [ "$CHANGES_COUNT" -gt "0" ]; then
            COMMIT_MSG="Weekly update: $DATE ($CHANGES_COUNT price change(s) detected)"
          else
            COMMIT_MSG="Weekly update: $DATE (no price changes)"
          fi
          git commit -m "$COMMIT_MSG" \
                     -m "Scraper summary:" -m "$SCRAPE_SUMMARY" \
                     -m "Chatter summary:" -m "$CHATTER_SUMMARY"
          git push
